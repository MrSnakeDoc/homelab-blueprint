---
networks:
  <yournetwork>:
    external: true

services:
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    user: "1000:1000"
    environment:
      - RI_REDIS_HOST=${REDIS_HOST:-redis-central}
      - RI_REDIS_PORT=${REDIS_PORT:-6379}
      - RI_REDIS_ALIAS=${REDIS_HOST:-redis-central}
      - RI_REDIS_USERNAME=${REDIS_USER:-default}
      - RI_REDIS_PASSWORD=${REDIS_PASSWORD:-''}
      - RI_REDIS_TLS=false
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.redisinsight.entrypoints=http,https'
      - 'traefik.http.routers.redisinsight.rule=Host(`redisinsight.<yourdomain>.<tld>`)'
      - 'traefik.http.services.redisinsight.loadbalancer.server.port=5540'
      - 'traefik.http.routers.redisinsight.service=redisinsight'
      - "traefik.docker.network=<yournetwork>"
      - 'traefik.http.routers.redisinsight.tls=true'
      - 'traefik.http.routers.redisinsight.tls.certresolver=prod'
    networks:
      - <yournetwork>
