---
networks:
  <yournetwork>:
    external: true

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    volumes:
      - ~/<replacepath>/pgadmin:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=$PGADMIN_DEFAULT_EMAIL
      - PGADMIN_DEFAULT_PASSWORD=$PGADMIN_DEFAULT_PASSWORD
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.entrypoints=http,https"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.<yourdomain>.<tld>`)"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "traefik.http.routers.pgadmin.service=pgadmin"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.routers.pgadmin.tls.certresolver=prod"
    networks:
      - <yournetwork>

  postgres_central:
    image: postgres:17.2-alpine3.20
    container_name: postgres_central
    restart: unless-stopped
    user: "999:999"
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: root
    volumes:
      - ~/<replacepath>/postgres/:/var/lib/postgresql/data
    networks:
      - <yournetwork>
