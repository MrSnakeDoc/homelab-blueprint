---
networks:
  <yournetwork>:
    external: true

services:
  redis-central:
    image: valkey/valkey:latest
    container_name: valkey
    restart: unless-stopped
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]
    user: "1000:1000"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli --user default --pass \"$VALKEY_PASSWORD\" PING | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - ~/<replacepath>:/data
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
    networks:
      - <yournetwork>
