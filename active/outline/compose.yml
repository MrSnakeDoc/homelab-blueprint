---
networks:
  <yournetwork>:
    external: true

services:
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    restart: unless-stopped
    container_name: outline
    env_file: .env
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 0.5
    user: "1000:1000"
    volumes:
      - ~/<replacepath>/outline/storage-data:/var/lib/outline/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.outline.entrypoints=http,https"
      - "traefik.http.routers.outline.rule=Host(`outline.<yourdomain>.<tld>`)"
      - "traefik.http.services.outline.loadbalancer.server.port=3000"
      - "traefik.http.routers.outline.service=outline"
      - "traefik.http.routers.outline.tls=true"
      - "traefik.http.routers.outline.tls.certresolver=prod"
    networks:
      - <yournetwork>
