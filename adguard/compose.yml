---
networks:
  <yournetwork>:
    external: true

services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - '53:53/tcp'
      - '53:53/udp'
    volumes:
      - ~/<replacepath>:/opt/adguardhome/work
      - ~/<replacepath>:/opt/adguardhome/conf
      - ~/<replacepath>:/opt/adguardhome/logs
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.adguard.entrypoints=http,https'
      - 'traefik.http.routers.adguard.rule=Host(`adguard.<yourdomain>.<tld>`)'
      - 'traefik.http.services.adguard.loadbalancer.server.port=3000'
      - 'traefik.http.routers.adguard.service=adguard'
      - 'traefik.http.routers.adguard.tls=true'
      - 'traefik.http.routers.adguard.tls.certresolver=prod'
    networks:
      - <yournetwork>
    environment:
      - TZ=Europe/Paris
