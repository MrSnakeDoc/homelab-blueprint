---
networks:
  <yournetwork>:
    external: true

services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command:
      - serve
    environment:
      - TZ=Europe/Paris
    volumes:
      - ~/<replacepath>/config/cache:/var/cache/ntfy
      - ~/<replacepath>/config/ntfy:/etc/ntfy
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.ntfy.entrypoints=http,https'
      - 'traefik.http.routers.ntfy.rule=Host(`ntfy.<yourdomain>.<tld>`)'
      - 'traefik.http.services.ntfy.loadbalancer.server.port=80'
      - 'traefik.http.routers.ntfy.service=ntfy'
      - 'traefik.http.routers.ntfy.tls=true'
      - 'traefik.http.routers.ntfy.tls.certresolver=prod'
    restart: unless-stopped
    networks:
      - <yournetwork>
