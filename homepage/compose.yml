---
networks:
  <yournetwork>:
    external: true

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    volumes:
      - ~/<replacepath>/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # - PUID=1000
      # - PGID=1000
      - LOG_LEVEL=info
      - HOMEPAGE_ALLOWED_HOSTS=homepage.<yourdomain>.<tld>
    env_file:
      - .env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.homepage.entrypoints=http,https'
      - 'traefik.http.routers.homepage.rule=Host(`homepage.<yourdomain>.<tld>`)'
      - 'traefik.http.services.homepage.loadbalancer.server.port=3000'
      - 'traefik.http.routers.homepage.service=homepage'
      - 'traefik.http.routers.homepage.tls=true'
      - 'traefik.http.routers.homepage.tls.certresolver=prod'
    networks:
      - <yournetwork>
